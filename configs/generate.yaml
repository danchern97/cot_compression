defaults:
  - paths: default
  - data: tiny_shakespeare_char
  - method: char_gpt/tiny
  - logging: wandb
  - _self_

mode: generate
checkpoint:
  path: null
prompt: "First Citizen:"
max_new_tokens: 200
temperature: 0.8
top_k: null
output_file: generated.txt
device: auto

hydra:
  run:
    dir: ${paths.output_dir}/runs/generate/${now:%Y-%m-%d}/${now:%H-%M-%S}
  job:
    chdir: true
