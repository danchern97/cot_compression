seed: 1337
device: auto
torch_dtype: bfloat16
max_length: null
batch_size: 4
max_batch_tokens: 32768
max_examples: null
metric: answer_logprob
normalize_by_length: true
save_token_logprobs: true
# Directory holding the precomputed CoT-entropy cache (npz). Null => compute
# inline on demand. Point it at a persistent path to reuse across a sweep.
# CoT entropies are always conditioned on the full prompt (never isolated).
entropy_cache_dir: null
# Save per-config answer-token entropies (artifacts/answer_entropies.npz).
save_entropies: false
methods:
  enabled:
    - base
    - random
  patching:
    uniform:
      patch_size: 8
    random:
      max_exponent: 6
    entropy:
      percentile: 80.0
  random:
    patching: null
  simple_mean:
    patching: null
  entropy_weighted_mean:
    patching: null
