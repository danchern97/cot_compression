seed: 1337
device: auto
torch_dtype: bfloat16
max_length: null
batch_size: 4
max_batch_tokens: 32768
max_examples: null
metric: answer_logprob
normalize_by_length: true
save_token_logprobs: true
# Directory holding the precomputed CoT-entropy cache (npz). Null => compute
# inline on demand. Point it at a persistent path to reuse across a sweep.
# CoT entropies are always conditioned on the full prompt (never isolated).
entropy_cache_dir: null
# Save per-config answer-token entropies (artifacts/answer_entropies.npz).
save_entropies: false
methods:
  enabled:
    - base
    - random
  patching:
    # Target compression ratio (= original_len / compressed_len = average patch
    # length, >= 1). Shared universal knob for uniform and every entropy-based
    # strategy (entropy_threshold, entropy_diff, entropy_sum); each derives its
    # own splitting constraint so the realized average patch length matches it.
    compression_ratio: 2.0
    random:
      max_exponent: 6
  random:
    patching: null
  simple_mean:
    patching: null
  entropy_weighted_mean:
    patching: null
    # softmax(ln H / T) pooling temperature: T=1 -> plain entropy-weighted mean,
    # T=0 -> keep only the highest-entropy token per patch.
    temperature: 1.0
